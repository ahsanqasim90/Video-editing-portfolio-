backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: public/portfolio
public_folder: /portfolio

collections:
  - name: site
    label: Website Content
    files:
      - name: content
        label: Portfolio Content
        file: src/data/siteContent.json
        format: json
        fields:
          - label: Profile
            name: profile
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Email, name: email, widget: string }
              - { label: Phone, name: phone, widget: string }
              - { label: Upwork URL, name: upworkUrl, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Location, name: location, widget: string }
              - { label: Rate, name: rate, widget: string }
              - { label: Success, name: success, widget: string }
              - { label: Jobs, name: jobs, widget: string }
              - { label: Hours, name: hours, widget: string }
              - { label: Overview, name: overview, widget: text }

          - label: Portfolio Items
            name: portfolioItems
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - label: Category
                name: category
                widget: select
                options:
                  - AI Ads
                  - UGC
                  - Product Ads
                  - Podcasts
                  - Auto Detailing
                  - Food
                  - Talking Head
                  - Gaming
                  - Music
                  - Construction
                  - Automobile
                  - Long to Short
              - { label: Client/Niche, name: niche, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Tools
                name: tools
                widget: list
                field: { label: Tool, name: tool, widget: string }
              - { label: Result, name: result, widget: text }
              - { label: Thumbnail, name: thumbnailUrl, widget: image, required: false }
              - { label: Video URL, name: videoUrl, widget: string, required: false }

          - label: Testimonials
            name: testimonials
            widget: list
            summary: "{{fields.client}}"
            fields:
              - { label: Client, name: client, widget: string }
              - { label: Platform, name: platform, widget: string }
              - { label: Rating, name: rating, widget: number, min: 1, max: 5 }
              - { label: Project, name: project, widget: string }
              - { label: Review Text, name: text, widget: text }

          - label: Tools
            name: tools
            widget: list
            field: { label: Tool, name: tool, widget: string }

          - label: Process Steps
            name: processSteps
            widget: list
            field: { label: Step, name: step, widget: string }

          - label: Selling Points
            name: sellingPoints
            widget: list
            field: { label: Point, name: point, widget: string }

          - label: Stats
            name: stats
            widget: list
            fields:
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }

          - label: Skills
            name: skills
            widget: list
            field: { label: Skill, name: skill, widget: string }

          - label: Certifications
            name: certifications
            widget: list
            field: { label: Certification, name: certification, widget: string }
